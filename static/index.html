<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity-Void Hotel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.4rem; }
    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; background: #dde1e7; font-size: 0.95rem; }
    .tab.active { background: #1a1a2e; color: #fff; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    h2 { font-size: 1.1rem; margin-bottom: 14px; color: #1a1a2e; }
    .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .form-row input, .form-row select { flex: 1 1 160px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    button.btn { padding: 9px 20px; border: none; border-radius: 6px; background: #1a1a2e; color: #fff; cursor: pointer; font-size: 0.9rem; }
    button.btn:hover { background: #16213e; }
    button.btn.danger { background: #c0392b; }
    #status-bar { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: none; }
    #status-bar.ok { background: #d4edda; color: #155724; display: block; }
    #status-bar.err { background: #f8d7da; color: #721c24; display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { background: #1a1a2e; color: #fff; padding: 8px 10px; text-align: left; }
    td { padding: 7px 10px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9f9f9; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; font-weight: bold; }
    .badge.yes { background: #d4edda; color: #155724; }
    .badge.no { background: #f8d7da; color: #721c24; }
    .token-box { padding: 8px 12px; background: #eef; border-radius: 6px; font-size: 0.82rem; word-break: break-all; margin-top: 8px; }
  </style>
</head>
<body>
<header>
  <h1>🏨 Infinity-Void Hotel</h1>
  <span id="auth-label" style="margin-left:auto;font-size:0.85rem;opacity:0.8"></span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('rooms')">Бөлмелер</button>
    <button class="tab" onclick="showTab('bookings')">Брондаулар</button>
    <button class="tab" onclick="showTab('auth')">Аутентификация</button>
    <button class="tab" onclick="showTab('users')">Пайдаланушылар</button>
  </div>

  <div id="status-bar"></div>

  <!-- ROOMS -->
  <div id="tab-rooms" class="section active">
    <div class="card">
      <h2>Бөлмелерді іздеу / сүзгілеу</h2>
      <div class="form-row">
        <select id="filter-type">
          <option value="">Барлық типтер</option>
          <option value="Standard">Standard</option>
          <option value="Lux">Lux</option>
        </select>
        <select id="filter-avail">
          <option value="">Кез-келген статус</option>
          <option value="true">Бос</option>
          <option value="false">Бронделген</option>
        </select>
        <button class="btn" onclick="loadRooms()">Іздеу</button>
      </div>
    </div>
    <div class="card">
      <h2>Жаңа бөлме қосу</h2>
      <div class="form-row">
        <input id="r-num" type="number" placeholder="Бөлме №" />
        <select id="r-type"><option value="Standard">Standard</option><option value="Lux">Lux</option></select>
        <input id="r-price" type="number" step="0.01" placeholder="Бағасы (₸/күн)" />
      </div>
      <button class="btn" onclick="createRoom()">Қосу</button>
    </div>
    <div class="card">
      <h2>Бөлмелер тізімі</h2>
      <table id="rooms-table">
        <thead><tr><th>ID</th><th>№</th><th>Тип</th><th>Бағасы</th><th>Статус</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- BOOKINGS -->
  <div id="tab-bookings" class="section">
    <div class="card">
      <h2>Брондауларды сүзгілеу</h2>
      <div class="form-row">
        <input id="f-uid" type="number" placeholder="Пайдаланушы ID" />
        <input id="f-checkin" type="date" placeholder="Check-in бастап" />
        <input id="f-checkout" type="date" placeholder="Check-out дейін" />
        <button class="btn" onclick="loadBookings()">Іздеу</button>
      </div>
    </div>
    <div class="card">
      <h2>Жаңа брондау</h2>
      <div class="form-row">
        <input id="b-uid" type="number" placeholder="Пайдаланушы ID" />
        <input id="b-rid" type="number" placeholder="Бөлме ID" />
        <input id="b-in" type="date" />
        <input id="b-out" type="date" />
      </div>
      <button class="btn" onclick="createBooking()">Брондау</button>
    </div>
    <div class="card">
      <h2>Брондаулар тізімі</h2>
      <table id="bookings-table">
        <thead><tr><th>ID</th><th>Пайдаланушы</th><th>Бөлме</th><th>Check-in</th><th>Check-out</th><th>Сомасы</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- AUTH -->
  <div id="tab-auth" class="section">
    <div class="card">
      <h2>Тіркелу (Register)</h2>
      <div class="form-row">
        <input id="reg-name" type="text" placeholder="Аты" />
        <input id="reg-email" type="email" placeholder="Email" />
        <input id="reg-pass" type="password" placeholder="Құпия сөз (мін. 8)" />
      </div>
      <button class="btn" onclick="register()">Тіркелу</button>
    </div>
    <div class="card">
      <h2>Кіру (Login)</h2>
      <div class="form-row">
        <input id="login-email" type="email" placeholder="Email" />
        <input id="login-pass" type="password" placeholder="Құпия сөз" />
      </div>
      <button class="btn" onclick="login()">Кіру</button>
      <div id="token-display" class="token-box" style="display:none"></div>
    </div>
  </div>

  <!-- USERS -->
  <div id="tab-users" class="section">
    <div class="card">
      <h2>Пайдаланушылар тізімі</h2>
      <button class="btn" onclick="loadUsers()" style="margin-bottom:12px">Жаңарту</button>
      <table id="users-table">
        <thead><tr><th>ID</th><th>Аты</th><th>Email</th><th>Брондаулар</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = '';

  function showTab(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'rooms') loadRooms();
    if (name === 'bookings') loadBookings();
    if (name === 'users') loadUsers();
  }

  function showStatus(msg, ok = true) {
    const el = document.getElementById('status-bar');
    el.textContent = msg;
    el.className = ok ? 'ok' : 'err';
    setTimeout(() => { el.style.display = 'none'; el.className = ''; }, 4000);
  }

  async function apiFetch(path, opts = {}) {
    const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
    return data;
  }

  async function loadRooms() {
    const type = document.getElementById('filter-type').value;
    const avail = document.getElementById('filter-avail').value;
    let url = '/rooms?';
    if (type) url += `type=${type}&`;
    if (avail !== '') url += `available=${avail}&`;
    const rooms = await apiFetch(url);
    const tbody = document.querySelector('#rooms-table tbody');
    tbody.innerHTML = rooms.map(r => `
      <tr>
        <td>${r.id}</td><td>${r.room_number}</td><td>${r.type}</td>
        <td>${r.price.toLocaleString()} ₸</td>
        <td><span class="badge ${r.is_available ? 'yes' : 'no'}">${r.is_available ? 'Бос' : 'Бронделген'}</span></td>
      </tr>`).join('');
  }

  async function createRoom() {
    try {
      await apiFetch('/rooms', { method: 'POST', body: JSON.stringify({
        room_number: +document.getElementById('r-num').value,
        type: document.getElementById('r-type').value,
        price: +document.getElementById('r-price').value,
      })});
      showStatus('Бөлме сәтті қосылды!');
      loadRooms();
    } catch (e) { showStatus(e.message, false); }
  }

  async function loadBookings() {
    const uid = document.getElementById('f-uid').value;
    const ci = document.getElementById('f-checkin').value;
    const co = document.getElementById('f-checkout').value;
    let url = '/bookings?';
    if (uid) url += `user_id=${uid}&`;
    if (ci) url += `check_in=${ci}&`;
    if (co) url += `check_out=${co}&`;
    const bookings = await apiFetch(url);
    const tbody = document.querySelector('#bookings-table tbody');
    tbody.innerHTML = bookings.map(b => `
      <tr>
        <td>${b.id}</td>
        <td>${b.user.username} (#${b.user.id})</td>
        <td>№${b.room.room_number} (${b.room.type})</td>
        <td>${b.check_in}</td><td>${b.check_out}</td>
        <td>${b.total_price?.toLocaleString()} ₸</td>
        <td><button class="btn danger" onclick="cancelBooking(${b.id})">Бас тарту</button></td>
      </tr>`).join('');
  }

  async function createBooking() {
    try {
      const res = await apiFetch('/bookings', { method: 'POST', body: JSON.stringify({
        user_id: +document.getElementById('b-uid').value,
        room_id: +document.getElementById('b-rid').value,
        check_in: document.getElementById('b-in').value,
        check_out: document.getElementById('b-out').value,
      })});
      showStatus(`Брондалды! Жалпы сомасы: ${res.total_price?.toLocaleString()} ₸`);
      loadBookings();
      loadRooms();
    } catch (e) { showStatus(e.message, false); }
  }

  async function cancelBooking(id) {
    try {
      await apiFetch(`/bookings/${id}`, { method: 'DELETE' });
      showStatus('Брондау бас тартылды.');
      loadBookings();
      loadRooms();
    } catch (e) { showStatus(e.message, false); }
  }

  async function register() {
    try {
      const res = await apiFetch('/register', { method: 'POST', body: JSON.stringify({
        username: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-pass').value,
      })});
      showStatus(`Тіркелдіңіз! ID: ${res.id}`);
    } catch (e) { showStatus(e.message, false); }
  }

  async function login() {
    try {
      const res = await apiFetch('/login', { method: 'POST', body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-pass').value,
      })});
      const box = document.getElementById('token-display');
      box.style.display = 'block';
      box.innerHTML = `<b>Кірдіңіз!</b> ${res.username}<br>Token: ${res.access_token}`;
      document.getElementById('auth-label').textContent = `Кірген: ${res.username}`;
      showStatus(`Сәтті кірдіңіз: ${res.username}`);
    } catch (e) { showStatus(e.message, false); }
  }

  async function loadUsers() {
    const users = await apiFetch('/users');
    const tbody = document.querySelector('#users-table tbody');
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>${u.id}</td><td>${u.username}</td><td>${u.email}</td>
        <td><a href="#" onclick="showUserBookings(${u.id}, '${u.username}'); return false;">Брондауларды көру</a></td>
      </tr>`).join('');
  }

  async function showUserBookings(uid, name) {
    const data = await apiFetch(`/users/${uid}/bookings`);
    const count = data.bookings.length;
    showStatus(`${name} брондаулары: ${count} жазба`);
    document.getElementById('f-uid').value = uid;
    document.querySelectorAll('.tab')[1].click();
  }

  loadRooms();
</script>
</body>
</html>
