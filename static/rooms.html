<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Номера — Infinity-Void Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Infinity-Void Hotel</a>
        <div>
            <a href="rooms.html">Номера</a>
            <a href="bookings.html">Бронирование</a>
            <span id="nav-user" class="user-info"></span>
            <a href="login.html" id="nav-login">Войти</a>
            <a href="register.html" id="nav-register">Регистрация</a>
            <a href="#" id="nav-logout" style="display:none" onclick="logout()">Выйти</a>
        </div>
    </nav>

    <div class="container">
        <h2>Номера отеля</h2>

        <div class="filter-bar">
            <label>Тип номера:</label>
            <select id="type-filter" onchange="loadRooms()">
                <option value="">Все типы</option>
                <option value="Standard">Standard</option>
                <option value="Lux">Lux</option>
            </select>
            <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
                <input type="checkbox" id="available-filter" onchange="loadRooms()">
                Только доступные
            </label>
        </div>

        <div id="rooms-container" class="rooms-grid">
            <p>Загрузка...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        updateNav();

        async function loadRooms() {
            const type = document.getElementById('type-filter').value;
            const availableOnly = document.getElementById('available-filter').checked;
            let rooms = await apiGetRooms(type);
            if (availableOnly) rooms = rooms.filter(r => r.is_available);

            const container = document.getElementById('rooms-container');
            if (!Array.isArray(rooms) || rooms.length === 0) {
                container.innerHTML = '<p>Номера не найдены.</p>';
                return;
            }

            container.innerHTML = rooms.map(room => `
                <div class="room-card">
                    <h3>Номер ${room.room_number}</h3>
                    <p><span class="badge badge-type">${room.type}</span></p>
                    <p style="margin-top:0.5rem;"><strong>Цена:</strong> ${room.price} ₸/ночь</p>
                    <p><span class="badge ${room.is_available ? 'badge-available' : 'badge-busy'}">
                        ${room.is_available ? 'Доступен' : 'Занят'}
                    </span></p>
                    ${room.is_available
                        ? `<button onclick="window.location.href='bookings.html?room_id=${room.id}'"
                               style="margin-top:1rem; width:100%;">Забронировать</button>`
                        : ''}
                </div>
            `).join('');
        }

        loadRooms();
    </script>
</body>
</html>
