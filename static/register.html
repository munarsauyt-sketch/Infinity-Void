<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Infinity-Void Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Infinity-Void Hotel</a>
        <div>
            <a href="rooms.html">Номера</a>
            <a href="login.html">Войти</a>
            <a href="register.html">Регистрация</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 440px; margin: 3rem auto;">
            <h2>Регистрация</h2>
            <div id="alert"></div>
            <form id="register-form">
                <div>
                    <label>Имя пользователя</label>
                    <input type="text" id="username" placeholder="Минимум 2 символа" required>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                <div>
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Минимум 6 символов" required>
                </div>
                <button type="submit">Создать аккаунт</button>
            </form>
            <p style="margin-top: 1rem; text-align: center;">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = await apiRegister(
                document.getElementById('username').value,
                document.getElementById('email').value,
                document.getElementById('password').value
            );
            if (result.id) {
                showAlert('alert', 'Аккаунт создан! Войдите в систему.', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showAlert('alert', result.detail || 'Ошибка регистрации', 'error');
            }
        });
    </script>
</body>
</html>
